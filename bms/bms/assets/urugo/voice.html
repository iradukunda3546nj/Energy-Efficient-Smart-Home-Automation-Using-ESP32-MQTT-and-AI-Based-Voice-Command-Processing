<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Urugo Voice System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="voice.css" />
  <!-- MQTT over WebSocket -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>

  <!-- Background -->
  <div class="bg-layer">
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>
    <div class="bg-grid"></div>
    <div class="bg-scanlines"></div>
  </div>

  <canvas id="particleCanvas"></canvas>

  <!-- ===================== HEADER ===================== -->
  <header class="header">
    <div class="header-left">
      <a href="../../dashboard.html" class="back-btn" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        <span>Dashboard</span>
      </a>
    </div>

    <div class="header-center">
      <div class="logo-mark">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="18" stroke="url(#lg)" stroke-width="1.5"/>
          <path d="M14 20a6 6 0 0012 0" stroke="url(#lg)" stroke-width="2" stroke-linecap="round"/>
          <line x1="20" y1="8" x2="20" y2="12" stroke="url(#lg)" stroke-width="2" stroke-linecap="round"/>
          <rect x="16" y="12" width="8" height="12" rx="4" fill="url(#lg)" opacity="0.9"/>
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#00f5a0"/>
              <stop offset="100%" stop-color="#00d9f5"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="header-title-group">
        <span class="header-subtitle">URUGO MANAGEMENT SYSTEM</span>
        <h1 class="header-title">VOICE SYSTEM</h1>
      </div>
    </div>

    <div class="header-right">
      <div class="mqtt-status">
        <div class="status-dot" id="mqttDot"></div>
        <span id="mqttLabel">CONNECTING</span>
      </div>
    </div>
  </header>

  <!-- ===================== MAIN ===================== -->
  <main class="main-content">

    <!-- Mic section -->
    <section class="mic-section" aria-label="Voice input">

      <div class="orbit-container" aria-hidden="true">
        <div class="orbit orbit-1"></div>
        <div class="orbit orbit-2"></div>
        <div class="orbit orbit-3"></div>
        <div class="orbit-dot orbit-dot-1"></div>
        <div class="orbit-dot orbit-dot-2"></div>
        <div class="orbit-dot orbit-dot-3"></div>
      </div>

      <!-- Rainbow border + button -->
      <div class="mic-border-wrapper" id="micBorderWrapper">
        <button class="mic-btn" id="micBtn" aria-label="Start voice command" aria-pressed="false">
          <div class="mic-inner">
            <svg class="mic-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="22" y="8" width="20" height="32" rx="10" fill="currentColor" opacity="0.9"/>
              <path d="M14 32c0 9.94 8.06 18 18 18s18-8.06 18-18" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
              <line x1="32" y1="50" x2="32" y2="58" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
              <line x1="22" y1="58" x2="42" y2="58" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            </svg>
            <div class="mic-ripple" id="micRipple"></div>
          </div>
          <div class="mic-state-label" id="micStateLabel">TAP TO SPEAK</div>
        </button>
      </div>

      <!-- Sound bars -->
      <div class="wave-visualizer" id="waveVisualizer" aria-hidden="true">
        <div class="wave-bar" style="--i:0"></div>
        <div class="wave-bar" style="--i:1"></div>
        <div class="wave-bar" style="--i:2"></div>
        <div class="wave-bar" style="--i:3"></div>
        <div class="wave-bar" style="--i:4"></div>
        <div class="wave-bar" style="--i:5"></div>
        <div class="wave-bar" style="--i:6"></div>
        <div class="wave-bar" style="--i:7"></div>
        <div class="wave-bar" style="--i:8"></div>
        <div class="wave-bar" style="--i:9"></div>
        <div class="wave-bar" style="--i:10"></div>
        <div class="wave-bar" style="--i:11"></div>
      </div>
    </section>

    <!-- Info panels -->
    <div class="panels-grid">

      <!-- Transcript -->
      <div class="glass-panel transcript-panel">
        <div class="panel-header">
          <div class="panel-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
          </div>
          <span class="panel-title">LIVE TRANSCRIPT</span>
          <div class="panel-live-dot" id="liveRecordDot"></div>
        </div>
        <div class="panel-body">
          <p class="transcript-text" id="transcriptText">
            <span class="transcript-placeholder">Waiting for voice input…</span>
          </p>
        </div>
      </div>

      <!-- Command -->
      <div class="glass-panel command-panel">
        <div class="panel-header">
          <div class="panel-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <polyline points="4 17 10 11 4 5"></polyline>
              <line x1="12" y1="19" x2="20" y2="19"></line>
            </svg>
          </div>
          <span class="panel-title">DETECTED COMMAND</span>
        </div>
        <div class="panel-body">
          <div class="command-display" id="commandDisplay">
            <span class="command-placeholder">—</span>
          </div>
          <div class="command-meta" id="commandMeta"></div>
        </div>
      </div>

      <!-- Status -->
      <div class="glass-panel status-panel">
        <div class="panel-header">
          <div class="panel-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
          </div>
          <span class="panel-title">SYSTEM STATUS</span>
        </div>
        <div class="panel-body">
          <div class="status-log" id="statusLog">
            <div class="log-entry log-info">
              <span class="log-time" id="initTime"></span>
              <span class="log-msg">Voice system initialized</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Devices -->
      <div class="glass-panel devices-panel">
        <div class="panel-header">
          <div class="panel-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
              <line x1="8" y1="21" x2="16" y2="21"></line>
              <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
          </div>
          <span class="panel-title">DEVICE CHANNELS</span>
        </div>
        <div class="panel-body devices-grid">

          <div class="device-card" id="dev-1">
            <div class="device-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
              </svg>
            </div>
            <span class="device-name">LIGHT</span>
            <span class="device-ch">CH 1</span>
            <div class="device-state-badge" id="badge-1">OFF</div>
          </div>

          <div class="device-card" id="dev-2">
            <div class="device-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/>
              </svg>
            </div>
            <span class="device-name">TV</span>
            <span class="device-ch">CH 2</span>
            <div class="device-state-badge" id="badge-2">OFF</div>
          </div>

          <div class="device-card" id="dev-3">
            <div class="device-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="5" y="2" width="14" height="20" rx="2"/><path d="M9 6h6M9 10h6"/>
              </svg>
            </div>
            <span class="device-name">FRIDGE</span>
            <span class="device-ch">CH 3</span>
            <div class="device-state-badge" id="badge-3">OFF</div>
          </div>

          <div class="device-card" id="dev-4">
            <div class="device-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="2" y="6" width="20" height="12" rx="2"/>
                <line x1="6" y1="10" x2="6" y2="14"/><line x1="10" y1="9" x2="10" y2="15"/>
                <line x1="14" y1="10" x2="14" y2="14"/><line x1="18" y1="10" x2="18" y2="14"/>
              </svg>
            </div>
            <span class="device-name">AC</span>
            <span class="device-ch">CH 4</span>
            <div class="device-state-badge" id="badge-4">OFF</div>
          </div>

          <div class="device-card" id="dev-5">
            <div class="device-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
            </div>
            <span class="device-name">SOCKET</span>
            <span class="device-ch">CH 5</span>
            <div class="device-state-badge" id="badge-5">OFF</div>
          </div>

        </div>
      </div>

    </div><!-- /panels-grid -->
  </main>

  <!-- Success Toast -->
  <div class="success-overlay" id="successOverlay" aria-live="assertive" aria-atomic="true">
    <div class="success-content">
      <div class="success-icon">
        <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="30" cy="30" r="28" stroke="url(#sg)" stroke-width="2"/>
          <polyline points="18 30 26 38 42 22" stroke="url(#sg)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="sg" x1="0" y1="0" x2="60" y2="60">
              <stop offset="0%" stop-color="#00f5a0"/>
              <stop offset="100%" stop-color="#00d9f5"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <p class="success-msg" id="successMsg"></p>
    </div>
  </div>

  <script src="voicever2.js"></script>
</body>
</html>
