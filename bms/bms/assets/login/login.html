<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Urugo Management System</title>
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <a href="#" class="logo">
      <div class="logo-icon">
        <span></span><span></span>
        <span></span><span></span>
      </div>
      <div class="logo-text">
        <div class="logo-name">Urugo</div>
        <div class="logo-sub">Management System</div>
      </div>
    </a>

    <!-- Header -->
    <div class="auth-header">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your account to continue</p>
    </div>

    <!-- Form -->
    <form class="auth-form" id="loginForm" novalidate>

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <div class="input-wrap">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" id="email" name="email" placeholder="admin@urugo.rw" autocomplete="email" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" />
          <button type="button" class="toggle-pw" aria-label="Toggle password visibility"></button>
        </div>
        <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
      </div>

      <label class="checkbox-group">
        <input type="checkbox" id="rememberMe" />
        <span class="checkbox-box"></span>
        Keep me signed in for 30 days
      </label>

      <button type="submit" class="btn btn-primary" id="loginBtn">
        <span class="btn-text">Sign In</span>
        <div class="spinner"></div>
      </button>

    </form>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Create one</a>
    </div>

  </div>
</div>

<!-- Scripts -->
<script src="js/auth.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {

  const form   = document.getElementById('loginForm');
  const btn    = document.getElementById('loginBtn');
  const emailI = document.getElementById('email');
  const passI  = document.getElementById('password');

  function validate() {
    let ok = true;
    clearAllErrors(form);

    if (!emailI.value.trim()) {
      fieldError(emailI, 'Email is required'); ok = false;
    } else if (!Validate.email(emailI.value)) {
      fieldError(emailI, 'Enter a valid email address'); ok = false;
    }

    if (!passI.value) {
      fieldError(passI, 'Password is required'); ok = false;
    }

    return ok;
  }

  [emailI, passI].forEach(i => i.addEventListener('input', () => clearFieldError(i)));

  form.addEventListener('submit', async e => {
    e.preventDefault();
    if (!validate()) return;

    setLoading(btn, true);

    try {
      const res = await apiPost('php/login.php', {
        email:       emailI.value.trim(),
        password:    passI.value,
        remember_me: document.getElementById('rememberMe').checked,
      });

      if (res.success) {
        Toast.success('Login successful! Redirecting…');

        setTimeout(() => {
          // ✅ FIXED REDIRECT (ABSOLUTE PATH)
          window.location.href = res.redirect || '/bms/dashboard.html';
        }, 900);

      } else {
        Toast.error(res.message || 'Invalid credentials');

        if (res.field === 'email')    fieldError(emailI, res.message);
        if (res.field === 'password') fieldError(passI,  res.message);
      }

    } catch (err) {
      // Demo fallback
      Toast.warning('Backend not connected — demo mode');

      setTimeout(() => {
        // ✅ FIXED REDIRECT HERE TOO
        window.location.href = '/bms/dashboard.html';
      }, 1200);

    } finally {
      setLoading(btn, false);
    }
  });
});
</script>

</body>
</html>
