<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Urugo Management System</title>
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <a href="login.html" class="logo">
      <div class="logo-icon">
        <span></span><span></span>
        <span></span><span></span>
      </div>
      <div class="logo-text">
        <div class="logo-name">Urugo</div>
        <div class="logo-sub">Management System</div>
      </div>
    </a>

    <!-- Step indicator -->
    <div class="steps" id="stepIndicator">
      <div class="step active" id="stepEl1">
        <div class="step-dot">1</div>
        <span>Identify</span>
      </div>
      <div class="step-line" id="line12"></div>
      <div class="step" id="stepEl2">
        <div class="step-dot">2</div>
        <span>Verify</span>
      </div>
      <div class="step-line" id="line23"></div>
      <div class="step" id="stepEl3">
        <div class="step-dot">3</div>
        <span>Reset</span>
      </div>
    </div>

    <!-- ── STEP 1: Request OTP ── -->
    <div id="step1">
      <div class="auth-header">
        <h1 class="auth-title">Forgot password?</h1>
        <p class="auth-subtitle">Enter your email or phone number and we'll send you a reset code.</p>
      </div>

      <form class="auth-form" id="step1Form" novalidate>
        <div class="form-group">
          <label class="form-label" for="identifier">Email or phone number</label>
          <div class="input-wrap">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="identifier" placeholder="you@example.com or 078…" autocomplete="off" />
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="step1Btn">
          <span class="btn-text">Send Reset Code</span>
          <div class="spinner"></div>
        </button>
      </form>
    </div>

    <!-- ── STEP 2: OTP entry ── -->
    <div id="step2" style="display:none">
      <div class="auth-header">
        <h1 class="auth-title">Enter reset code</h1>
        <p class="auth-subtitle" id="step2Subtitle">Enter the 6-digit code we sent you.</p>
      </div>

      <form class="auth-form" id="step2Form" novalidate>
        <div class="otp-group">
          <input class="otp-input" type="text" inputmode="numeric" maxlength="1" data-index="0" />
          <input class="otp-input" type="text" inputmode="numeric" maxlength="1" data-index="1" />
          <input class="otp-input" type="text" inputmode="numeric" maxlength="1" data-index="2" />
          <input class="otp-input" type="text" inputmode="numeric" maxlength="1" data-index="3" />
          <input class="otp-input" type="text" inputmode="numeric" maxlength="1" data-index="4" />
          <input class="otp-input" type="text" inputmode="numeric" maxlength="1" data-index="5" />
        </div>

        <div class="otp-timer">
          Expires in <span id="resetTimer">05:00</span>
          <button type="button" class="resend-btn" id="resetResendBtn">Resend</button>
        </div>

        <button type="submit" class="btn btn-primary" id="step2Btn" disabled>
          <span class="btn-text">Verify Code</span>
          <div class="spinner"></div>
        </button>
      </form>
    </div>

    <!-- ── STEP 3: New password ── -->
    <div id="step3" style="display:none">
      <div class="auth-header">
        <h1 class="auth-title">Set new password</h1>
        <p class="auth-subtitle">Create a strong password you haven't used before.</p>
      </div>

      <form class="auth-form" id="step3Form" novalidate>
        <div class="form-group">
          <label class="form-label" for="newPassword">New password</label>
          <div class="input-wrap">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="newPassword" placeholder="Min. 8 characters" autocomplete="new-password" />
            <button type="button" class="toggle-pw" aria-label="Toggle"></button>
          </div>
          <div class="pw-strength">
            <div class="strength-bar"><div class="strength-fill" id="resetStrengthFill"></div></div>
            <div class="strength-text" id="resetStrengthText"></div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmNewPw">Confirm new password</label>
          <div class="input-wrap">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="confirmNewPw" placeholder="Re-enter new password" autocomplete="new-password" />
            <button type="button" class="toggle-pw" aria-label="Toggle"></button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="step3Btn">
          <span class="btn-text">Reset Password</span>
          <div class="spinner"></div>
        </button>
      </form>
    </div>

    <!-- Back link -->
    <div class="auth-footer" style="margin-top:1.25rem">
      <a href="login.html">← Back to sign in</a>
    </div>

  </div>
</div>

<script src="js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  initPasswordStrength('newPassword', 'resetStrengthFill', 'resetStrengthText');

  let resetState = { userId: null, token: null };

  // ── Step helpers ──
  function goStep(n) {
    [1,2,3].forEach(i => {
      document.getElementById(`step${i}`).style.display = i === n ? '' : 'none';
      const el = document.getElementById(`stepEl${i}`);
      el.classList.toggle('active', i === n);
      el.classList.toggle('done',   i < n);
    });
    if (n >= 2) document.getElementById('line12').classList.add('done');
    if (n >= 3) document.getElementById('line23').classList.add('done');
  }

  // ── Step 1 ──
  const identI = document.getElementById('identifier');
  document.getElementById('step1Form').addEventListener('submit', async e => {
    e.preventDefault();
    const val = identI.value.trim();
    if (!val) { fieldError(identI, 'Enter your email or phone'); return; }
    clearFieldError(identI);

    const btn = document.getElementById('step1Btn');
    setLoading(btn, true);
    try {
      const res = await apiPost('php/forgot_password.php', { identifier: val });
      if (res.success) {
        resetState.userId = res.user_id;
        const masked = val.includes('@')
          ? val.replace(/(.{2})(.*)(@.*)/, '$1••••$3')
          : val.slice(0,4) + '••••' + val.slice(-3);
        document.getElementById('step2Subtitle').textContent = `Enter the 6-digit code sent to ${masked}`;
        Toast.success('Reset code sent!');
        goStep(2);
        startResetTimer();
        initOtpInputs();
      } else {
        Toast.error(res.message || 'Account not found');
        fieldError(identI, res.message);
      }
    } catch {
      // Demo
      resetState.userId = 'demo';
      Toast.warning('Demo mode — continuing');
      goStep(2);
      startResetTimer();
      initOtpInputs();
    } finally {
      setLoading(btn, false);
    }
  });

  // ── OTP inputs (step 2) ──
  function initOtpInputs() {
    const inputs = Array.from(document.querySelectorAll('#step2 .otp-input'));
    const btn2   = document.getElementById('step2Btn');

    function checkComplete() {
      btn2.disabled = inputs.some(i => !i.value);
      inputs.forEach(i => i.classList.toggle('filled', !!i.value));
    }

    inputs.forEach((inp, idx) => {
      inp.addEventListener('input', e => {
        inp.value = e.target.value.replace(/\D/g, '').slice(-1);
        checkComplete();
        if (inp.value && idx < inputs.length - 1) inputs[idx + 1].focus();
      });
      inp.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !inp.value && idx > 0) {
          inputs[idx - 1].value = ''; inputs[idx - 1].focus(); checkComplete();
        }
      });
      inp.addEventListener('paste', e => {
        e.preventDefault();
        const p = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
        p.split('').forEach((ch, i) => { if (inputs[i]) inputs[i].value = ch; });
        checkComplete();
        const ne = inputs.findIndex(i => !i.value);
        if (ne !== -1) inputs[ne].focus(); else inputs[5].focus();
      });
    });

    inputs[0].focus();

    document.getElementById('step2Form').addEventListener('submit', async e => {
      e.preventDefault();
      const otp = inputs.map(i => i.value).join('');
      if (otp.length !== 6) return;

      const btn = document.getElementById('step2Btn');
      setLoading(btn, true);
      try {
        const res = await apiPost('php/verify_otp.php', {
          user_id: resetState.userId, otp_code: otp, type: 'reset'
        });
        if (res.success) {
          resetState.token = res.token;
          Toast.success('Code verified!');
          goStep(3);
        } else {
          Toast.error(res.message || 'Invalid code');
          inputs.forEach(i => { i.value = ''; i.classList.remove('filled'); });
          inputs[0].focus(); btn2.disabled = true;
        }
      } catch {
        Toast.success('Demo mode — code accepted');
        resetState.token = 'demo_token';
        goStep(3);
      } finally {
        setLoading(btn, false);
      }
    });
  }

  // ── Timer (step 2) ──
  let timerInterval;
  function startResetTimer() {
    let s = 300;
    const el = document.getElementById('resetTimer');
    const rb = document.getElementById('resetResendBtn');
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      s--;
      el.textContent = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
      if (s <= 0) { clearInterval(timerInterval); el.textContent = 'Expired'; el.style.color='var(--error)'; rb.classList.add('show'); }
    }, 1000);
    rb.addEventListener('click', () => { s = 300; el.style.color=''; rb.classList.remove('show'); });
  }

  // ── Step 3 ──
  const newPwI  = document.getElementById('newPassword');
  const confPwI = document.getElementById('confirmNewPw');
  [newPwI, confPwI].forEach(i => i.addEventListener('input', () => clearFieldError(i)));

  document.getElementById('step3Form').addEventListener('submit', async e => {
    e.preventDefault();
    clearAllErrors(document.getElementById('step3Form'));
    let ok = true;

    const { strong } = Validate.password(newPwI.value);
    if (!strong) { fieldError(newPwI, 'Password is too weak'); ok = false; }
    if (newPwI.value !== confPwI.value) { fieldError(confPwI, 'Passwords do not match'); ok = false; }
    if (!ok) return;

    const btn = document.getElementById('step3Btn');
    setLoading(btn, true);
    try {
      const res = await apiPost('php/reset_password.php', {
        user_id:      resetState.userId,
        token:        resetState.token,
        new_password: newPwI.value,
      });
      if (res.success) {
        Toast.success('Password reset successfully!');
        setTimeout(() => { window.location.href = 'login.html'; }, 1200);
      } else {
        Toast.error(res.message || 'Reset failed');
      }
    } catch {
      Toast.success('Demo mode — password reset!');
      setTimeout(() => { window.location.href = 'login.html'; }, 1200);
    } finally {
      setLoading(btn, false);
    }
  });
});
</script>
</body>
</html>
